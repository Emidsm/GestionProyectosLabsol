services:
  postgres:
    image: postgres:15-alpine
    container_name: gestion-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gestion_proyectos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gestion_proyectos"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: gestion-minio
    environment:
      MINIO_ROOT_USER: admin_proconecta
      MINIO_ROOT_PASSWORD: superpassword123
    ports:
      - "9000:9000" # API
      - "9001:9001" # Consola
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
      target: development
    container_name: gestion-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gestion_proyectos
      PORT: 3001
      NODE_ENV: development
      JWT_SECRET: super_secreto_para_desarrollo_proconecta
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: admin_proconecta
      MINIO_SECRET_KEY: superpassword123
      MINIO_BUCKET: proconecta-uploads
    volumes:
      - ./Backend:/app
      - /app/node_modules
    ports: # <--- Asegúrate de que esté alineado con "environment" y "volumes"
      - "3001:3001"
      - "5555:5555" 
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:

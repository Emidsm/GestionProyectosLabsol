version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gestion-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gestion_proyectos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./Backend
      target: development
    container_name: gestion-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gestion_proyectos
      PORT: 3001
      NODE_ENV: development
    volumes:
      - ./Backend:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    depends_on:
      - postgres

volumes:
  postgres_data:
